joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

arm_slide_controller:
  type: effort_controllers/JointPositionController
  joint: link_slide
  pid: {p: 100.0, i: 0.0, d: 10}

arm_rotate_controller:
  type: effort_controllers/JointPositionController
  joint: link_rotate
  pid: {p: 1.0, i: 0.0, d: 0.1}

wheel_left_controller:
  type: velocity_controllers/JointVelocityController
  joint: wheel_left_rear
  pid: {p: 100.0, i: 0.0, d: 10}

wheel_right_controller:
  type: velocity_controllers/JointVelocityController
  joint: wheel_right_rear
  pid: {p: 100.0, i: 0.0, d: 10}

front_left_steer_controller:
  type: effort_controllers/JointPositionController
  joint: steering_left
  pid: {p: 100.0, i: 0.0, d: 10}

front_right_steer_controller:
  type: effort_controllers/JointPositionController
  joint: steering_right
  pid: {p: 100.0, i: 0.0, d: 10}